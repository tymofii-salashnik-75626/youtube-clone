<html>
    <head>
        <title>YouTube</title>
        <meta charset="utf-8">
        <link rel="stylesheet" href="https://unpkg.com/lucide-static@latest/font/lucide.css" />

        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div id="top-content">
            <div id="menu-logo">
                <!-- <img id="menu-btn" class="user" src="pictures/menu.png"> -->
                <i class="button circle-button icon-menu" style="font-size: 24px;" onclick="progressBar()"></i>
                <img id="youtube-logo" src="pictures/mini-logo.png">
            </div>
            <div id="search-content">
                <input type="text" placeholder="Поиск">
                <button class="button circle-button" onclick="progressBar()"><i class="icon icon-search"></i></button>

                <button class="button circle-button" onclick="progressBar()"><i class="icon icon-mic"></i></button>
            </div>
            <div id="user-content">
                <!-- <img id="create-btn" src="pictures/create.png"> -->
                <button id="create-btn"class="button"><i class="icon icon-plus"></i><strong>Создать</strong></button>
                <button id="bell-button" class="circle-button" onclick="progressBar()"><i class="icon icon-bell"></i></button>
                <img id="user-btn" src="pictures/user.png" onclick="progressBar()">
            </div>
        </div>
        <div id="main-content">
            <div id="left-content">
                <iframe class="main-video" width="1000" 
                        height="570"
                        src="https://www.youtube.com/embed/lX0_X1kJfTo" 
                        title="YouTube video player" 
                        frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                        allowfullscreen>
                </iframe>
                <h2 id="title-main-video">Щенок в восторге от своей первой ванны</h2>
                <div id="under-h2">
                    <div id="user-info">
                        <img id="author" src="pictures/user.png">
                        <div id="sub-info">
                            <!-- <img id="user-btn" class="user" src="pictures/user.png"> -->
                            <label class="sub-info-label nickname">User</label><br>
                            <label class="sub-info-label subs">Много подписчиков</label>
                        </div>
                        <button id="subscribe">Подписаться</button>
                    </div>
                    <div id="like-share"> 
                        <div id="like-class">
                            <button class=" like button circle-button"><i class="icon icon-thumbs-up"></i></button>
                            <button class="like button circle-button"><i class="icon icon-thumbs-down"></i></button>
                        </div>
                        <div id="share-class">
                            <button id="like-share-button"><i class="icon icon-share-2"></i><strong>Поделиться</strong></button>
                            <button id="like-share-button"><i class="icon icon-save"></i><strong>Сохранить</strong></button>
                        </div>
                    </div>
                </div>
                <div id="description">
                    <label id="desc-info">2 509 704 просмотра  23 мая 2026 г.</label>
                    <p>Щенок в восторге от своей первой ванны</p>
                    <label id="full-desc">Развернуть</label>
                </div>
                <div id="comments">
                <p>Комментарии отключены. <a href="https://support.google.com/youtube/answer/9706180?hl=ru">Подробнее…</a></p>
                </div>
            </div>
